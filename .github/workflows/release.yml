name: Build & Release

on:
  push:
    branches: [ "main" ]
  # Полезно добавить workflow_dispatch, чтобы можно было запускать сборку кнопкой вручную из GitHub
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build shadow JAR
        run: ./gradlew build

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: FreshDonatePlugin
          path: build/libs/*.jar

      - name: Get version from build.gradle.kts
        id: version
        run: |
          VERSION=$(grep 'version = ' build.gradle.kts | cut -d'"' -f2)
          SHORT_SHA=$(git rev-parse --short HEAD)
          echo "tag=v${VERSION}-${SHORT_SHA}" >> "$GITHUB_OUTPUT"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: FreshDonate Plugin ${{ steps.version.outputs.tag }}
          body: |
            🚀 Автоматическая сборка из коммита ${{ github.sha }}

            **Требования:**
            * Spigot / Paper 1.13.2+
            * Java 8+
          files: build/libs/*.jar
          make_latest: true