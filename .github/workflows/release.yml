name: Build & Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build shadow JAR
        run: ./gradlew shadowJar

      - name: Get version from build.gradle.kts
        id: version
        run: |
          VERSION=$(grep 'version = ' build.gradle.kts | head -1 | sed 's/.*"\(.*\)"/\1/')
          SHORT_SHA=$(git rev-parse --short HEAD)
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=v${VERSION}-${SHORT_SHA}" >> "$GITHUB_OUTPUT"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: FreshDonate Plugin ${{ steps.version.outputs.tag }}
          body: |
            Auto-release from commit ${{ github.sha }}

            **Совместимость:** Spigot/Paper 1.13.2+
          files: build/libs/FreshDonatePlugin-*.jar
          make_latest: true
