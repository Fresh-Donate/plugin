# FreshDonate Plugin Configuration

api:
  # URL вашего FreshDonate Backend API
  url: "http://localhost:3001"

  # API ключ для аутентификации (берётся из панели администратора)
  apiKey: ""

  # ID сервера в режиме "Мультисервера" - заполните, если в панели
  # включён мультисервер. Берётся в админке: "Настройки → Серверы".
  # Используется только для маршрутизации выдачи на этот конкретный сервер,
  # авторизацией не является - без правильного apiKey бесполезен.
  #
  # ВАЖНО: не используйте один serverId на двух физических серверах -
  # выдача задвоится, оба плагина будут забирать одни и те же задания.
  serverId: ""

  # Интервал опроса API в секундах
  pollInterval: 10
